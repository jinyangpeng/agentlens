# AgentLens UI nginx 配置
# - SPA fallback（前端路由）
# - /api 反代到后端容器
# - gzip 压缩
# - 静态资源长缓存

upstream agentlens_backend {
    server backend:8000;
}

server {
    listen 80;
    server_name _;

    # gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 1024;

    # /api 反代到后端
    location /api/ {
        proxy_pass http://agentlens_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # SSE / 长连接支持
        proxy_buffering off;
        proxy_read_timeout 60s;
    }

    # Swagger UI 页面 + OpenAPI schema 反代到后端
    location /docs {
        proxy_pass http://agentlens_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /openapi.json {
        proxy_pass http://agentlens_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # 静态资源
    location /assets/ {
        alias /usr/share/nginx/html/assets/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # SPA fallback（Vue/React Router）
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # 简单健康检查端点
    location = /healthz {
        access_log off;
        return 200 "ok\n";
    }
}
